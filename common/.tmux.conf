# set to non-login shell
set -g default-command "${SHELL}"

# rebind prefix key to ctrl space
unbind C-b
set -g prefix ` 
bind ` send-prefix

# Start numbering from 1 not 0
set -g base-index 1
set -g pane-base-index 1

# start renumbering windows after one is closed
set -g renumber-windows on

# increase number of history lines
set -g history-limit 100000

# set vi mode
set -g status-keys vi
setw -g mode-keys vi

# disable pause for esc key, helps vi mode
set -sg escape-time 50

# enable 256 colors on terminal
set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

# Enable undercurl support
set -as terminal-overrides ',*:Smulx=\E[4::%p1%dm'

# Enable undercurl colors
set -as terminal-overrides ',*:Setulc=\E[58::2::%p1%{65536}%/%d::%p1%{256}%/%{255}%&%d::%p1%{255}%&%d%;m'

# Sane splitting
bind \\ split-window -h -c '#{pane_current_path}'
bind - split-window -v -c '#{pane_current_path}'
unbind '"'
unbind %

# map Vi movement keys as pane movement keys
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# map Shift-<dir> to move a pane
bind H swap-pane -t '{left-of}'
bind J swap-pane -t '{down-of}' 
bind K swap-pane -t '{up-of}' 
bind L swap-pane -t '{right-of}' 

# resize panes using PREFIX ALT-{h, j, k, l}
bind -r M-h resize-pane -L 5
bind -r M-j resize-pane -D 5
bind -r M-k resize-pane -U 5
bind -r M-l resize-pane -R 5

# break current pane out into its own new window/tab
bind b break-pane

# move panes between windows/tabs (prompts for other window number)
bind g command-prompt -p "send pane to window:" "join-pane -t ':%%'"

# swap 2 panes
bind m select-pane -m
bind t swap-pane

# disable prefix space which auto reorganizes panes in the window
unbind Space

# quick pane cycling
unbind ^A
bind ^A select-pane -t :.+

# rename current session
bind $ command-prompt -I "#S" "rename-session -- '%%'"

# Smart pane switching with awareness of Vim splits.
# See: https://github.com/christoomey/vim-tmux-navigator
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" "send-keys C-h"  "select-pane -L"
bind-key -n 'C-j' if-shell "$is_vim" "send-keys C-j"  "select-pane -D"
bind-key -n 'C-k' if-shell "$is_vim" "send-keys C-k"  "select-pane -U"
bind-key -n 'C-l' if-shell "$is_vim" "send-keys C-l"  "select-pane -R"
bind-key -n "C-\\" if-shell "$is_vim" "send-keys C-\\" "select-pane -l"

# Copying Configurations
# Setup 'v' to begin selection, just like Vim
bind-key -T copy-mode-vi v send-keys -X begin-selection

# Setup 'y' to yank (copy), just like Vim
bind-key -T copy-mode-vi y send-keys -X copy-pipe "reattach-to-user-namespace pbcopy"

# Update default binding of `Enter` to also use copy-pipe
# unbind -t vi-copy Enter
# bind-key -T copy-mode-vi Enter send-keys -X copy-pipe "reattach-to-user-namespace pbcopy"

# Bind ']' to use pbbaste
bind ] run "reattach-to-user-namespace pbpaste | tmux load-buffer - && tmux paste-buffer"

# force a reload of the config file
unbind r
bind r source-file ~/.tmux.conf \; display "Reloaded"

# status bar
set-option -g status-position top
set -g status-style fg=white,bg=colour38
set-window-option -g status-left " #S "
set-window-option -g status-left-style fg=black,bg=white
# set battery % in top right corner
set-option -g status-right ""

# tabs
setw -g window-status-format "#[fg=black]#[bg=colour38] #I#[bg=colour38]#[fg=black] #W "
setw -g window-status-current-format "#[bg=black]#[fg=white] *#I#[fg=white,bold]#[bg=black] [#W] "

# pane
set -g pane-border-style fg=white
set -g pane-active-border-style fg=colour38,bg=black

# Changing resurrect key bindings
set -g @resurrect-save 'S'
set -g @resurrect-restore 'R'

# Plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-resurrect' # Restart tmux where I left off
run '/usr/share/tmux-plugin-manager/tpm'
